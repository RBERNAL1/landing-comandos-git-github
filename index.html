<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Git Commands UI</title>

  <style>
    .glass {
      backdrop-filter: blur(12px);
      background: rgba(15, 23, 42, 0.7);
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-black text-white p-6">

  <div class="max-w-5xl mx-auto space-y-8">

    <!-- HEADER -->
    <div class="text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-blue-400 via-cyan-300 to-indigo-400 bg-clip-text text-transparent">
        Git & GitHub Setup
      </h1>
      <p class="text-slate-400 mt-3">Guía rápida para inicializar y versionar tu proyecto</p>
    </div>

    <!-- CARD 01 -->
    <div class="glass border border-slate-800 rounded-3xl shadow-2xl overflow-hidden hover:scale-[1.01] transition">

      <div class="flex items-center gap-4 px-6 py-5 border-b border-slate-800">
        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center font-bold text-lg shadow-lg">
          01
        </div>
        <div>
          <h2 class="text-xl font-bold">INICIALIZAR PROYECTO</h2>
          <p class="text-slate-400 text-sm">Crear estructura base con Git</p>
        </div>
      </div>

      <div class="relative p-6 bg-black">
        <button onclick="copyCode('code1')" class="absolute top-3 right-3 text-xs px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-lg">
          Copiar
        </button>

        <pre id="code1" class="text-base leading-8 font-mono">
<code><span class="text-cyan-400">mkdir</span> <span class="text-blue-300">proyecto-git</span>
<span class="text-cyan-400">cd</span> <span class="text-blue-300">proyecto-git</span>
<span class="text-cyan-400">git</span> <span class="text-emerald-400">init</span></code>
        </pre>
      </div>

    </div>

    <!-- CARD 02 -->
    <div class="glass border border-slate-800 rounded-3xl shadow-2xl overflow-hidden hover:scale-[1.01] transition">

      <div class="flex items-center gap-4 px-6 py-5 border-b border-slate-800">
        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center font-bold text-lg shadow-lg">
          02
        </div>
        <div>
          <h2 class="text-xl font-bold">PRIMER COMMIT LOCAL</h2>
          <p class="text-slate-400 text-sm">Guardar cambios iniciales del proyecto</p>
        </div>
      </div>

      <div class="relative p-6 bg-black">
        <button onclick="copyCode('code2')" class="absolute top-3 right-3 text-xs px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-lg">
          Copiar
        </button>

        <pre id="code2" class="text-base leading-8 font-mono">
<code><span class="text-cyan-400">git</span> <span class="text-emerald-400">add</span> .
<span class="text-cyan-400">git</span> <span class="text-emerald-400">commit</span> -m <span class="text-yellow-300">"proyecto base"</span></code>
        </pre>
      </div>

    </div>

  </div>

  <!-- SCRIPT COPIAR -->
  <script>
    function copyCode(id) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writText(text);
      alert("Copiado ");
    }
  </script>

</body>
</html>
